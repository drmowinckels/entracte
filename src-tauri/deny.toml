[graph]
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
]
all-features = false

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
# Enforce `unsound` informational advisories. "all" (not "workspace") so
# transitive crates are covered — the unsound advisory we actually care
# about (glib, RUSTSEC-2024-0429, below) reaches us only transitively via
# Tauri's GTK3 backend, so a workspace-only scope would never surface it
# and the ignore below would be dead config.
unsound = "all"
ignore = [
  # RUSTSEC-2024-0429: glib's VariantStrIter has unsound Iterator /
  # DoubleEndedIterator impls. No patched glib version exists yet; it is a
  # transitive dependency via Tauri's Linux GTK3 backend and cannot be
  # upgraded independently of Tauri. Remove this ignore once a patched glib
  # is published and pulled into a Tauri release.
  # https://rustsec.org/advisories/RUSTSEC-2024-0429
  # Tracking: https://github.com/drmowinckels/entracte/issues/84
  "RUSTSEC-2024-0429",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "CC0-1.0",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
