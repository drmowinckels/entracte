cache = true
max_cache_age = "1d"
no_progress = true
accept = ["200", "206", "429"]
max_concurrency = 8
timeout = 20
retry_wait_time = 2
# Retry transient failures (connection resets, momentary 5xx) a few times
# before failing the merge-blocking gate, so a single network blip on one
# of ~300 external links doesn't red the whole run.
max_retries = 5
fallback_extensions = ["md", "html"]

exclude_loopback = true
exclude_all_private = true

exclude = [
  '^https?://example\.com',
  # Academic publishers bot-block link checkers but resolve fine in browsers.
  # DOI is a canonical identifier; checking it adds no signal.
  '^https?://(dx\.)?doi\.org/',
  '^https?://(.*\.)?(wiley|tandfonline|sagepub|mdpi|apa|jstor|springer|frontiersin|elsevier|nature|sciencedirect)\.com',
  # freesound.org (sound-attribution credits in docs) returns 403 to the
  # link checker via bot protection but resolves fine in a browser. Same
  # rationale as the publishers above — exclude rather than accept 403
  # globally, which would mask real auth failures elsewhere.
  '^https?://(.*\.)?freesound\.org',
  # Canonical attribution / boilerplate links that are stable in a browser
  # but intermittently 5xx or reset the connection against the checker:
  #   - claude.com/claude-code: the Claude Code attribution in README / PR
  #     bodies — returned HTTP 500 on consecutive runs (likely rejecting the
  #     runner IP).
  #   - contributor-covenant.org: the CoC source links — reset mid-request.
  # Same rationale as the publishers above: exclude these canonical URLs
  # rather than accept 500 globally, which would mask real failures.
  '^https?://(www\.)?claude\.com',
  '^https?://(www\.)?contributor-covenant\.org',
  # rustdoc / TypeDoc output: generated into the built site at /api/{rust,ts}/,
  # not present in source.
  '/api/(rust|ts)/',
  # In-repo GitHub URLs (blob/tree/issues/pull/commit). These only
  # resolve after the referencing commit lands on main, so on PR runs
  # they 404 even when the link is correct. The lychee gate is now
  # merge-blocking, so excluding them avoids spurious failures —
  # broken in-repo links surface as 404s in the rendered docs anyway.
  '^https?://github\.com/drmowinckels/entracte/(blob|tree|issues|pull|commit)/',
  # CHANGELOG cross-reference links to release tags and compare URLs only
  # resolve after the release is cut and pushed — on the PR that introduces
  # a new `## [vX.Y.Z]` section those links 404 by design. Excluding them
  # lets changelog prep land before the tag itself.
  '^https?://github\.com/drmowinckels/entracte/(compare|releases/tag)/',
  # VitePress mounts `docs/public/` at the site root, so `/audio/...`
  # and similar public-mounted assets don't exist under `docs/` — they
  # live under `docs/public/`. The `--root-dir docs` invocation handles
  # everything else, but the public-mounted prefixes need an URL-form
  # exclude (lychee resolves them to `file:///…/docs/audio/…` before
  # matching against this list). Add new public asset dirs here as they
  # appear.
  'file://.*?/docs/audio/',
  'file://.*?/docs/videos/',
]

exclude_path = [
  "node_modules",
  "target",
  "dist",
  "coverage",
  "src-tauri/gen",
  "docs/.vitepress/cache",
  ".claude",
]
