coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        # 100% was aspirational but proved impossible to sustain on PRs
        # that add defensive error / branch paths (signature mismatch
        # arms, filesystem-error fall-through, regex-shape rejection
        # branches in PII redactors). Those lines are intentionally
        # never reached in the success path, and many can't be tested
        # without filesystem-permission mocks. 90% keeps the gate
        # meaningful — a dramatic drop still trips it — while leaving
        # room for security-hardening PRs to ship without fighting
        # branch-coverage artifacts on every push.
        target: 90%
        threshold: 0%
        informational: false

comment:
  layout: "header, diff, flags, components, files"
  behavior: default
  require_changes: false
  show_carryforward_flags: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: frontend
      paths:
        - src/
    - name: rust
      paths:
        - src-tauri/src/

component_management:
  individual_components:
    - component_id: frontend
      name: Frontend (TypeScript)
      paths:
        - src/**
    - component_id: rust
      name: Backend (Rust)
      paths:
        - src-tauri/src/**

ignore:
  - "src/**/*.test.*"
  - "src/**/*.spec.*"
  - "src/test-setup.ts"
  - "src/main.tsx"
  - "src/vite-env.d.ts"
  - "src-tauri/target/**"
  - "src-tauri/gen/**"
  - "scripts/**"
  - "docs/**"
