name: Release build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Default to least-privilege. Each job below escalates explicitly when it
# needs to upload artifacts / draft releases / request an OIDC token.
permissions:
  contents: read

jobs:
  # Cheap pre-flight: refuse to start a release build if the updater
  # pubkey was committed as the bring-up placeholder. Shipping a
  # binary with the placeholder freezes every install onto a
  # non-verifying updater forever — every later release would need
  # to be installed manually because the bundled pubkey can't
  # validate the new signed manifest. Better to fail fast.
  #
  # Three checks, each on its own to keep the failure message
  # specific: (1) field present and non-null, (2) base64 contents
  # and at least ~80 chars (real minisign pubkeys are ~152), (3)
  # the decoded blob starts with the minisign "untrusted comment:
  # minisign public key" header. (3) is what actually catches
  # arbitrary placeholder strings — (1) and (2) just give cleaner
  # error messages for the easy mistakes.
  verify-updater-pubkey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Refuse placeholder pubkey
        run: |
          set -euo pipefail
          pubkey=$(jq -r '.plugins.updater.pubkey' src-tauri/tauri.conf.json)
          if [ -z "$pubkey" ] || [ "$pubkey" = "null" ]; then
            echo "::error::plugins.updater.pubkey is empty or missing; aborting release"
            exit 1
          fi
          if [ "${#pubkey}" -lt 80 ] || ! [[ "$pubkey" =~ ^[A-Za-z0-9+/=]+$ ]]; then
            echo "::error::plugins.updater.pubkey is too short or not base64; aborting release"
            exit 1
          fi
          if ! echo "$pubkey" | base64 -d 2>/dev/null | head -1 | \
               grep -q '^untrusted comment: minisign public key'; then
            echo "::error::plugins.updater.pubkey doesn't decode to a minisign public key blob; aborting release"
            exit 1
          fi

  build-unix:
    needs: verify-updater-pubkey
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # tauri-action drafts/updates the GitHub release
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxss-dev rpm

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # SHA-pinned: this action handles Apple signing secrets and drafts the
      # release. A compromised upstream tag could exfiltrate APPLE_CERTIFICATE
      # / APPLE_PASSWORD or replace artifacts. Update via dependabot.yml.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing key. `bundle.createUpdaterArtifacts:
          # true` in tauri.conf.json makes tauri-action sign each
          # macOS `.app.tar.gz` with this key and emit a `.sig`
          # sibling. The matching public key is pinned in
          # `plugins.updater.pubkey` — rotating this key without
          # also rotating the pubkey on installed binaries breaks
          # auto-update for every existing install, so keep them in
          # lockstep.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "Entracte ${{ github.ref_name }}"
          releaseDraft: true
          # 0.0.X tags are betas; 0.1.X and later are stable. Flip the
          # github_release `prerelease` flag based on the tag prefix
          # so beta releases don't accidentally surface as "latest".
          prerelease: ${{ startsWith(github.ref_name, 'v0.0.') }}
          args: ${{ matrix.args }}

  build-windows-unsigned:
    needs: verify-updater-pubkey
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build (Tauri-signed updater artifacts)
        env:
          # `bundle.createUpdaterArtifacts: true` makes `tauri build`
          # emit `<bundle>.sig` alongside each `.msi` / `.exe`, signed
          # with this key. The Authenticode signature applied later by
          # SignPath is independent — SmartScreen warns until SignPath
          # is wired, but the in-app updater can still verify the
          # Tauri signature against the bundled `plugins.updater.pubkey`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p unsigned
          # `.msi*` / `.exe*` globs capture the `.sig` siblings too —
          # the manifest job needs them to populate the windows-x86_64
          # entry in latest.json.
          cp src-tauri/target/release/bundle/msi/*.msi* unsigned/
          cp src-tauri/target/release/bundle/nsis/*.exe* unsigned/

      # SHA-pinned: this action stages the unsigned Windows bundles
      # for `sign-windows` to consume. A compromised upstream tag
      # could swap in artifacts that SignPath then signs and ships.
      # Update via dependabot.yml.
      - id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-unsigned
          path: unsigned/
          if-no-files-found: error

  # Compose the signed `latest.json` manifest that `tauri-plugin-updater`
  # fetches from the configured endpoint. macOS `.app.tar.gz`, Linux
  # `.AppImage`, and Windows `.msi` all ship with Tauri-signed `.sig`
  # siblings; this job downloads them from the draft release and
  # composes one `latest.json` covering all three platforms.
  #
  # Windows note: `check_for_update` in-app only *checks* for updates
  # and opens the release page in the browser — `download_and_install`
  # is not wired today. So even though the Windows `.msi` is signed
  # only with the Tauri updater key (the Authenticode signature from
  # SignPath is independent and may or may not be present), the
  # SmartScreen warning users see is the same one they'd see on a
  # manual download. The About tab calls out the unsigned status.
  publish-updater-manifest:
    needs: [build-unix, sign-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download updater artifacts from draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p release-assets
          # `gh release download` on a draft release needs the
          # `contents:write` token above to see drafts. Patterns
          # collect macOS `.app.tar.gz[.sig]`, Linux `.AppImage[.sig]`,
          # and Windows `.msi[.sig]` pairs in one pass.
          gh release download "${{ github.ref_name }}" \
            --pattern '*.app.tar.gz*' \
            --pattern '*.AppImage*' \
            --pattern '*.msi*' \
            --dir release-assets
          ls -la release-assets

      - name: Compose latest.json
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO_URL="https://github.com/${{ github.repository }}"

          # tauri-action's bundle naming conventions, by target:
          #   macOS   : <productName>_<version>_<arch>.app.tar.gz[.sig]
          #             productName="Entracte", arches "aarch64" + "x64".
          #   Linux   : <productNameLower>_<version>_amd64.AppImage[.sig]
          #             productName lowercases on Linux.
          #   Windows : <productName>_<version>_x64_en-US.msi[.sig]
          #             the locale suffix is what tauri-bundler emits;
          #             update here if we ever switch the MSI locale.
          AARCH64_FILE="Entracte_${VERSION}_aarch64.app.tar.gz"
          X64_FILE="Entracte_${VERSION}_x64.app.tar.gz"
          APPIMAGE_FILE="entracte_${VERSION}_amd64.AppImage"
          MSI_FILE="Entracte_${VERSION}_x64_en-US.msi"

          for f in "${AARCH64_FILE}.sig" "${X64_FILE}.sig" "${APPIMAGE_FILE}.sig" "${MSI_FILE}.sig"; do
            if [ ! -f "release-assets/${f}" ]; then
              echo "::error::missing ${f} — TAURI_SIGNING_PRIVATE_KEY may be unset, or the build job for this platform didn't produce updater artifacts"
              exit 1
            fi
          done
          AARCH64_SIG=$(cat "release-assets/${AARCH64_FILE}.sig")
          X64_SIG=$(cat "release-assets/${X64_FILE}.sig")
          APPIMAGE_SIG=$(cat "release-assets/${APPIMAGE_FILE}.sig")
          MSI_SIG=$(cat "release-assets/${MSI_FILE}.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "See release notes at ${REPO_URL}/releases/tag/${TAG}" \
            --arg aarch64_url "${REPO_URL}/releases/download/${TAG}/${AARCH64_FILE}" \
            --arg aarch64_sig "$AARCH64_SIG" \
            --arg x64_url "${REPO_URL}/releases/download/${TAG}/${X64_FILE}" \
            --arg x64_sig "$X64_SIG" \
            --arg appimage_url "${REPO_URL}/releases/download/${TAG}/${APPIMAGE_FILE}" \
            --arg appimage_sig "$APPIMAGE_SIG" \
            --arg msi_url "${REPO_URL}/releases/download/${TAG}/${MSI_FILE}" \
            --arg msi_sig "$MSI_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $aarch64_sig,  url: $aarch64_url  },
                "darwin-x86_64":  { signature: $x64_sig,      url: $x64_url      },
                "linux-x86_64":   { signature: $appimage_sig, url: $appimage_url },
                "windows-x86_64": { signature: $msi_sig,      url: $msi_url      }
              }
            }' > latest.json

          cat latest.json

      - name: Attach latest.json to draft release
        # SHA-pinned to match the sign-windows uploader below. A
        # compromised tag could exfiltrate the GITHUB_TOKEN or
        # replace artifacts on the draft release. Update via
        # dependabot.yml.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: latest.json

  # Authenticode-sign the Windows `.msi` / `.exe` via SignPath Foundation
  # if their `SIGNPATH_API_TOKEN` secret is configured; otherwise pass the
  # unsigned bundles straight through to the draft release. The Tauri
  # `.sig` sidecars always come from the unsigned artifact — SignPath
  # only emits signed binaries, so if we relied on whatever it returned
  # the manifest job would lose the sidecars.
  #
  # SIGNPATH_ORGANIZATION_ID (repo variable) and SIGNPATH_API_TOKEN (repo
  # secret) get configured after SignPath Foundation approval. Until then,
  # SmartScreen warns on install and stays warning on every release —
  # which is why we *do* still ship Windows in `latest.json` (manual
  # check-for-updates redirects users to the release page) but the
  # About tab calls out the unsigned status. Project / policy slugs are
  # hardcoded; see SIGNPATH_SETUP.md for the bring-up checklist.
  sign-windows:
    needs: build-windows-unsigned
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Probe SignPath availability
        id: signpath
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          if [ -n "$SIGNPATH_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SIGNPATH_API_TOKEN unset — uploading unsigned Windows binaries. SmartScreen will warn on install."
          fi

      # SHA-pinned: this action holds the SignPath OIDC token. Update via dependabot.
      - name: SignPath signing
        if: steps.signpath.outputs.available == 'true'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: entracte
          signing-policy-slug: release-signing
          github-artifact-id: ${{ needs.build-windows-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      # Always pull the unsigned artifact so the Tauri `.sig` sidecars
      # are available regardless of which signing path ran. SignPath's
      # action emits *only* the signed binaries — sidecar files are
      # not part of its contract — so the manifest job would otherwise
      # lose the `.sig` pair the moment SignPath is wired.
      # SHA-pinned. Update via dependabot.
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: windows-unsigned
          path: unsigned

      - name: Assemble release bundle (binaries + Tauri .sig sidecars)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signed
          # `.sig` files always come from the unsigned artifact; on the
          # SignPath path `signed/` already contains the signed binaries
          # but not the sidecars, on the no-SignPath path it's empty.
          cp unsigned/*.sig signed/
          if [ "${{ steps.signpath.outputs.available }}" != "true" ]; then
            cp unsigned/*.msi unsigned/*.exe signed/
          fi
          ls -la signed

      # SHA-pinned: uploads to the GitHub release. Update via dependabot.
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: signed/*

  # Aggregate SHA256 checksums for every artifact on the draft release into
  # SHA256SUMS.txt (uploaded as an asset) and a markdown table appended to
  # the release body. The table sits between HTML markers so re-runs replace
  # the section instead of stacking duplicates. Needed by the Homebrew cask
  # bump and any other downstream packagers that pin by sha256.
  checksums:
    needs: [build-unix, sign-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --pattern '*'

      - name: Compute SHA256SUMS.txt
        run: |
          cd assets
          # Checksum every artifact except updater signatures and any
          # pre-existing checksum files from a prior re-run.
          mapfile -t files < <(ls -1 | grep -vE '\.(sig|sha256)$|^SHA256SUMS')
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no artifacts found on draft release"
            exit 1
          fi
          shasum -a 256 "${files[@]}" | tee ../SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt as a release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Splice checksum table into release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          START='<!-- checksums:start -->'
          END='<!-- checksums:end -->'

          {
            echo "## Checksums"
            echo ""
            echo "| File | SHA256 |"
            echo "| --- | --- |"
            while read -r sum file; do
              echo "| \`${file}\` | \`${sum}\` |"
            done < SHA256SUMS.txt
          } > checksums.md

          gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json body --jq '.body // ""' > current.md

          # Strip any previous checksums block (markers + content between them).
          awk -v s="$START" -v e="$END" '
            $0 == s { skip = 1; next }
            $0 == e { skip = 0; next }
            !skip   { print }
          ' current.md > stripped.md

          {
            cat stripped.md
            printf '\n%s\n' "$START"
            cat checksums.md
            printf '%s\n' "$END"
          } > combined.md

          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes-file combined.md
